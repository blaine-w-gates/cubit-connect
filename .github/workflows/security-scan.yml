name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *' # Daily at midnight

jobs:
  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (security rules)
        run: |
          npm run lint -- --ext .ts,.tsx --format json --output-file eslint-report.json || true

      - name: Check for secrets (basic)
        run: |
          # Check for common secret patterns
          grep -r -n "password\|secret\|key\|token" --include="*.ts" --include="*.tsx" src/ || true
          grep -r -n "BEGIN RSA\|BEGIN OPENSSH\|BEGIN PGP" --include="*.ts" --include="*.tsx" src/ || true

      - name: Dependency audit
        run: npm audit --audit-level moderate

      - name: Run security tests
        run: npm test -- --reporter=verbose tests/unit/auditLogger.test.ts tests/unit/sentryIntegration.test.ts

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: |
            eslint-report.json
            npm-audit.json
